<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Thesis Resource Finder</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" crossorigin href="./assets/index-CpH0J_JI.css">
    <style>
      #auth-gate {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #auth-gate .auth-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      #auth-gate .auth-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 1.25rem;
        background: #3b82f6;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #auth-gate .auth-icon svg {
        width: 24px;
        height: 24px;
        stroke: white;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      #auth-gate h2 {
        color: #f1f5f9;
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      #auth-gate p {
        color: #94a3b8;
        font-size: 0.875rem;
        margin: 0 0 1.5rem;
      }
      #auth-gate input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 0.9375rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
        box-sizing: border-box;
      }
      #auth-gate input:focus {
        border-color: #3b82f6;
      }
      #auth-gate input.error {
        border-color: #ef4444;
        animation: shake 0.3s ease-in-out;
      }
      #auth-gate button {
        width: 100%;
        padding: 0.75rem;
        margin-top: 0.75rem;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s;
      }
      #auth-gate button:hover {
        background: #2563eb;
      }
      #auth-gate .error-msg {
        color: #ef4444;
        font-size: 0.8125rem;
        margin-top: 0.5rem;
        min-height: 1.2em;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      #app-content { display: none; }
    </style>
  </head>
  <body>
    <div id="auth-gate">
      <div class="auth-card">
        <div class="auth-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2>Password Required</h2>
        <p>Enter the password to access this page.</p>
        <form id="auth-form" autocomplete="off">
          <input type="password" id="auth-input" placeholder="Password" autofocus />
          <button type="submit">Unlock</button>
          <div class="error-msg" id="auth-error"></div>
        </form>
      </div>
    </div>
    <div id="app-content">
      <div id="root"></div>
    </div>
    <script>
      (function() {
        var HASH = 'c03fffb68e696095d5e07fdd8d77cf544cf994599f99676ce0cf6b53fadaceb8';
        var SESSION_KEY = '_thesis_auth';

        async function sha256(str) {
          var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
          return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
        }

        function unlock() {
          document.getElementById('auth-gate').remove();
          document.getElementById('app-content').style.display = 'block';
          var s = document.createElement('script');
          s.type = 'module';
          s.crossOrigin = '';
          s.src = './assets/index-tlL5t0SV.js';
          document.body.appendChild(s);
          try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
        }

        if (sessionStorage.getItem(SESSION_KEY) === '1') {
          unlock();
        } else {
          document.getElementById('auth-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var input = document.getElementById('auth-input');
            var h = await sha256(input.value);
            if (h === HASH) {
              unlock();
            } else {
              input.classList.add('error');
              document.getElementById('auth-error').textContent = 'Incorrect password';
              setTimeout(function() { input.classList.remove('error'); }, 300);
            }
          });
        }
      })();
    </script>
  </body>
</html>
